services:

  # ── PostgreSQL 16 ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: smarthospital-postgres
    environment:
      POSTGRES_DB:       smarthospital
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d smarthospital"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  # ── Redis 7 ──────────────────────────────────────────────────────────────────
  # Included now; the application uses InMemoryRefreshTokenStore until
  # RedisRefreshTokenStore is implemented (Checklist item P0).
  # Redis is already wired in the compose stack so the switch requires
  # only a code change — no infra change.
  redis:
    image: redis:7-alpine
    container_name: smarthospital-redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
    volumes:
      - redis_data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "2"

  # ── Spring Boot API ───────────────────────────────────────────────────────────
  api:
    build:
      context: ./smart-hospital-api
      dockerfile: Dockerfile
    container_name: smarthospital-api
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL:        jdbc:postgresql://postgres:5432/smarthospital
      DB_USER:       ${DB_USER}
      DB_PASSWORD:   ${DB_PASSWORD}
      JWT_SECRET:    ${JWT_SECRET}
      CORS_ORIGINS:  ${CORS_ORIGINS}
      REDIS_HOST:    redis
      REDIS_PORT:    6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    # Port 8080 is NOT exposed to the host — only Nginx talks to it internally.
    # Uncomment the line below if you need direct API access for debugging:
    # ports:
    #   - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ── Nginx + React SPA ─────────────────────────────────────────────────────────
  web:
    build:
      context: ./smart-hospital-web
      dockerfile: Dockerfile
    container_name: smarthospital-web
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
