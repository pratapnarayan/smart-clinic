spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/smarthospital
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true

app:
  jwt:
    secret: dev-secret-key-change-in-prod-min32c   # exactly 38 chars — safe for dev
  token-store: memory

logging:
  level:
    com.smarthospital: DEBUG
    org.hibernate.SQL: DEBUG
    org.flywaydb: INFO
