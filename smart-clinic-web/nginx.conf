server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Compression ───────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/rss+xml application/atom+xml
        image/svg+xml font/woff2;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"                       always;
    add_header X-Content-Type-Options "nosniff"                          always;
    add_header X-XSS-Protection       "1; mode=block"                   always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── Static asset caching ──────────────────────────────────────────────────
    # Vite fingerprints JS/CSS with content hashes — safe to cache for 1 year
    location ~* \.(js|css|woff|woff2|ttf|eot|ico|png|jpg|jpeg|gif|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── API proxy → Spring Boot backend ──────────────────────────────────────
    location /api/ {
        proxy_pass         http://api:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
    }

    # ── Swagger UI ────────────────────────────────────────────────────────────
    location /swagger-ui/ {
        proxy_pass         http://api:8080/swagger-ui/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    location /v3/api-docs {
        proxy_pass         http://api:8080/v3/api-docs;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # ── Actuator health (used by Docker healthcheck on the web container) ─────
    location /actuator/ {
        proxy_pass         http://api:8080/actuator/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # ── React Router SPA fallback ─────────────────────────────────────────────
    # All unmatched routes serve index.html so client-side routing works
    location / {
        try_files $uri $uri/ /index.html;
    }
}
